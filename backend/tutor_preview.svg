<svg viewBox="0 0 420 320" xmlns="http://www.w3.org/2000/svg">
  <title>Use of Force Step Ladder</title>
  <desc>A ladder showing steps from talk first up to necessary force, with a stop sign at the top</desc>

  <!-- Background -->
  <rect x="0" y="0" width="420" height="320" fill="#f0f4ff"/>

  <!-- Title -->
  <text x="210" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Use of Force Ladder</text>

  <!-- Step 1 - bottom -->
  <rect x="60" y="250" width="300" height="42" rx="6" fill="#a8d5a2" stroke="#3a7d44" stroke-width="2"/>
  <text x="210" y="269" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a3a1a">STEP 1: Talk to the person</text>
  <text x="210" y="285" text-anchor="middle" font-size="11" fill="#1a3a1a">Use words. Try to calm them down.</text>

  <!-- Arrow up -->
  <line x1="210" y1="248" x2="210" y2="228" stroke="#555" stroke-width="2"/>
  <polygon points="210,218 204,230 216,230" fill="#555"/>
  <text x="245" y="238" font-size="10" fill="#555">If not working</text>

  <!-- Step 2 - middle -->
  <rect x="80" y="170" width="260" height="42" rx="6" fill="#ffe599" stroke="#b8860b" stroke-width="2"/>
  <text x="210" y="189" text-anchor="middle" font-size="13" font-weight="bold" fill="#3a2a00">STEP 2: Small physical force</text>
  <text x="210" y="205" text-anchor="middle" font-size="11" fill="#3a2a00">Grab wrist or hold arm. No more.</text>

  <!-- Arrow up -->
  <line x1="210" y1="168" x2="210" y2="148" stroke="#555" stroke-width="2"/>
  <polygon points="210,138 204,150 216,150" fill="#555"/>
  <text x="245" y="158" font-size="10" fill="#555">If still danger</text>

  <!-- Step 3 - top -->
  <rect x="100" y="90" width="220" height="42" rx="6" fill="#f4a460" stroke="#8b4513" stroke-width="2"/>
  <text x="210" y="109" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a0a00">STEP 3: More force if needed</text>
  <text x="210" y="125" text-anchor="middle" font-size="11" fill="#2a0a00">Only as much as the danger needs.</text>

  <!-- STOP box -->
  <rect x="120" y="45" width="180" height="36" rx="8" fill="#e74c3c" stroke="#900" stroke-width="2"/>
  <text x="210" y="58" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">STOP when person stops</text>
  <text x="210" y="73" text-anchor="middle" font-size="11" fill="#fff">resisting. No extra force!</text>

  <!-- Arrow from step 3 to stop -->
  <line x1="210" y1="88" x2="210" y2="83" stroke="#e74c3c" stroke-width="2"/>
  <polygon points="210,81 204,89 216,89" fill="#e74c3c"/>

  <!-- Side note -->
  <rect x="5" y="155" width="48" height="80" rx="4" fill="#dce8ff" stroke="#336" stroke-width="1"/>
  <text x="29" y="172" text-anchor="middle" font-size="9" fill="#224">Think</text>
  <text x="29" y="184" text-anchor="middle" font-size="9" fill="#224">about</text>
  <text x="29" y="196" text-anchor="middle" font-size="9" fill="#224">YOU:</text>
  <text x="29" y="208" text-anchor="middle" font-size="9" fill="#224">fit?</text>
  <text x="29" y="220" text-anchor="middle" font-size="9" fill="#224">trained?</text>
  <text x="29" y="232" text-anchor="middle" font-size="9" fill="#224">hurt?</text>

  <rect x="367" y="155" width="48" height="80" rx="4" fill="#ffe8dc" stroke="#633" stroke-width="1"/>
  <text x="391" y="172" text-anchor="middle" font-size="9" fill="#422">Think</text>
  <text x="391" y="184" text-anchor="middle" font-size="9" fill="#422">about</text>
  <text x="391" y="196" text-anchor="middle" font-size="9" fill="#422">THEM:</text>
  <text x="391" y="208" text-anchor="middle" font-size="9" fill="#422">weapon?</text>
  <text x="391" y="220" text-anchor="middle" font-size="9" fill="#422">drunk?</text>
  <text x="391" y="232" text-anchor="middle" font-size="9" fill="#422">size?</text>

  <!-- Page refs -->
  <text x="210" y="310" text-anchor="middle" font-size="10" fill="#666">Pages 82-84 | Section 26 Criminal Code p.44</text>
</svg>